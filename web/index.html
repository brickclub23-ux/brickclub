<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BrickClub — build real ownership through verified property-backed BrickShares with transparent performance and trusted crypto settlement.">

  <!-- Branded boot loader styles (shown until Flutter renders its first frame). -->
  <style>
    #boot-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: #0B0D0F;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #boot-loader.boot-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #boot-loader .boot-mark {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 0.5px;
      color: #F4F5F6;
    }
    #boot-loader .boot-mark span { color: #D8A94F; }
    #boot-loader .boot-spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid #20252A;
      border-top-color: #D8A94F;
      animation: boot-spin 0.9s linear infinite;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="brickclub">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>brickclub</title>
  <link rel="manifest" href="manifest.json">

  <!-- Captures the PWA install prompt so the app can offer "Install the app". -->
  <script>
    window.brickclubPwa = (function () {
      var deferred = null;
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        deferred = event;
      });
      window.addEventListener('appinstalled', function () {
        deferred = null;
      });

      function detectPlatform() {
        var ua = navigator.userAgent || navigator.vendor || '';
        // iPadOS 13+ reports as desktop Safari, so also treat touch-capable
        // Macs as iOS for install-instruction purposes.
        var isIosDevice = /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        if (isIosDevice) {
          return 'ios';
        }
        if (/android/i.test(ua)) {
          return 'android';
        }
        return 'desktop';
      }

      function isStandalone() {
        return (window.matchMedia &&
            window.matchMedia('(display-mode: standalone)').matches) ||
          window.navigator.standalone === true;
      }

      return {
        canInstall: function () { return deferred !== null; },
        platform: function () { return detectPlatform(); },
        isStandalone: function () { return isStandalone(); },
        prompt: function () {
          if (deferred === null) {
            return Promise.resolve('unavailable');
          }
          var event = deferred;
          deferred = null;
          event.prompt();
          return event.userChoice.then(function (choice) {
            return choice.outcome;
          });
        }
      };
    })();
  </script>
</head>
<body>
  <!-- Shown immediately while Flutter boots, then faded out on first frame. -->
  <div id="boot-loader">
    <div class="boot-mark">The Brick<span>Club</span></div>
    <div class="boot-spinner"></div>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('boot-loader');
      if (loader) {
        loader.classList.add('boot-hidden');
        setTimeout(function () { loader.remove(); }, 450);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
