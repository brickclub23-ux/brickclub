name: PR preview (Firebase Hosting)

# Builds the Flutter web app and deploys it to a temporary Hosting preview
# channel for each pull request, then comments the preview URL on the PR.
# Note: only Hosting supports preview channels — Cloud Functions and rules are
# NOT deployed here, they only go live via the production workflow on merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: firebase-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Skip preview for PRs coming from forks — they cannot access secrets.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 20 for the firebase-tools auth toolchain. On Node 22 the bundled
          # undici drops the OAuth token request to googleapis.com ("Premature
          # close" / "Failed to authenticate"). The action shells out to npx, so
          # whatever Node is on PATH here is what firebase-tools runs under.
          node-version: 20

      - name: Build Flutter web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        env:
          # Force ADC to use the service-account credentials directly instead of
          # probing the (absent) GCE metadata server, which races and surfaces as
          # "Failed to authenticate" in CI.
          METADATA_SERVER_DETECTION: none
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BRICKCLUB }}
          projectId: brickclub
          expires: 7d
          # Pinned: firebase-tools 15.22.2 intermittently fails service-account
          # auth in CI. 15.22.1 is the last version that deploys reliably. Keep in
          # sync with firebase-deploy.yml. Revisit when a fix ships upstream.
          firebaseToolsVersion: "15.22.1"
