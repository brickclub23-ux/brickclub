name: Release apps (APK + IPA)

# Builds the release Android APK and an UNSIGNED iOS IPA, then publishes both as
# assets on a GitHub Release. The landing page download links point at this
# release's assets via the stable /releases/latest/download/<asset> URLs, so the
# asset names below (brickclub.apk / brickclub.ipa) must stay in sync with the
# URLs in lib/src/app/landing_page.dart.
#
# Triggers:
#   - Push a version tag like v1.0.0 -> builds both and publishes a Release.
#   - Manual run (workflow_dispatch) -> builds both as artifacts only (no Release,
#     since there is no tag to attach them to).

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the Release and upload assets

concurrency:
  group: release-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Stage APK with release name
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/brickclub.apk
          ls -lh dist/brickclub.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: brickclub-apk
          path: dist/brickclub.apk
          if-no-files-found: error
          retention-days: 14

  ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (release, no code signing)
        run: flutter build ios --release --no-codesign

      - name: Package Runner.app into an unsigned .ipa
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected $APP_PATH but it was not produced by the build."
            exit 1
          fi
          mkdir -p dist/Payload
          cp -R "$APP_PATH" dist/Payload/
          cd dist
          zip -qry brickclub.ipa Payload
          rm -rf Payload
          ls -lh brickclub.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: brickclub-ipa
          path: dist/brickclub.ipa
          if-no-files-found: error
          retention-days: 14

  release:
    # Only publish a Release for tag pushes; manual runs just produce artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: brickclub-apk
          path: dist

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: brickclub-ipa
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ls -lh dist
          # Create the release if it does not exist yet, then (re)upload assets.
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --notes "Android APK and unsigned iOS IPA for $TAG. The iOS build is unsigned — install it with a sideloading tool (AltStore, Sideloadly, ESign)."
          fi
          gh release upload "$TAG" \
            dist/brickclub.apk dist/brickclub.ipa \
            --repo "$REPO" --clobber
